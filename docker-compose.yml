version: '3.8'

services:
  # Redis for session management
  redis:
    image: redis:7-alpine
    container_name: namma-pothole-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - namma-network


  # Backend API server
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: namma-pothole-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Database connections
      MONGODB_URI: ${MONGODB_URI}
      REDIS_URL: redis://redis:6379
      
      # Twilio configuration (add your credentials)
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      
      # AWS S3 configuration (add your credentials)
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_BUCKET_REGION: ${AWS_S3_BUCKET_REGION}
      
      # Frontend URL for CORS
      FRONTEND_URL: https://nammapothole.com
      
      # Node environment
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - namma-network

  # Frontend React application (caddy serving static files)
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://nammapothole.com/api}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY}
    container_name: namma-pothole-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - namma-network

  # Caddy reverse proxy with automatic HTTPS
  caddy:
    image: caddy:2-alpine
    container_name: namma-pothole-caddy
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - namma-network

volumes:
  redis_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  namma-network:
    driver: bridge
